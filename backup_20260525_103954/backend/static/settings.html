<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI导游设置</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 1.1rem;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 3px solid transparent;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .card.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
        }
        .card-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .card-desc {
            font-size: 1rem;
            margin-bottom: 10px;
        }
        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 0.9rem;
            color: #666;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .meta-icon {
            font-size: 1rem;
        }
        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            display: block;
            margin: 30px auto 0;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }
        .status-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 1rem;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .status-bar.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .current-config {
            background: rgba(102, 126, 234, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }
        .config-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .config-label {
            color: #333;
            font-weight: 600;
        }
        .config-value {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI导游设置</h1>
            <p>选择您喜欢的大模型和语音风格</p>
        </div>
        
        <div class="section">
            <h2>🧠 大模型选择</h2>
            <div class="grid" id="modelsGrid"></div>
        </div>
        
        <div class="section">
            <h2>🔊 语音风格</h2>
            <div class="grid" id="voicesGrid"></div>
        </div>
        
        <div class="current-config">
            <h3>当前配置</h3>
            <div class="config-item">
                <span class="config-label">模型：</span>
                <span class="config-value" id="currentModel">加载中...</span>
            </div>
            <div class="config-item">
                <span class="config-label">音色：</span>
                <span class="config-value" id="currentVoice">加载中...</span>
            </div>
        </div>
        
        <button class="btn-save" onclick="saveSettings()">保存设置</button>
    </div>
    
    <div class="status-bar" id="statusBar"></div>

    <script>
        let currentModel = 'qwen-plus';
        let currentVoice = 'zh-CN-XiaoxiaoNeural';
        
        // 加载模型列表
        async function loadModels() {
            try {
                const response = await fetch('/api/config/models');
                const data = await response.json();
                const grid = document.getElementById('modelsGrid');
                grid.innerHTML = '';
                
                data.models.forEach(model => {
                    const card = document.createElement('div');
                    card.className = `card ${model.id === currentModel ? 'active' : ''}`;
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="card-title">${model.name}</span>
                            <span class="card-badge">${model.speed}</span>
                        </div>
                        <div class="card-desc">${model.desc}</div>
                        <div class="card-meta">
                            <div class="meta-item">
                                <span class="meta-icon">📊</span>
                                <span>上下文: ${model.context_length}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-icon">💰</span>
                                <span>输入: ${model.input_price}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-icon">💰</span>
                                <span>输出: ${model.output_price}</span>
                            </div>
                        </div>
                    `;
                    card.onclick = () => selectModel(model.id);
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('加载模型列表失败:', error);
            }
        }
        
        // 加载音色列表
        async function loadVoices() {
            try {
                const response = await fetch('/api/config/voices');
                const data = await response.json();
                const grid = document.getElementById('voicesGrid');
                grid.innerHTML = '';
                
                data.voices.forEach(voice => {
                    const card = document.createElement('div');
                    card.className = `card ${voice.id === currentVoice ? 'active' : ''}`;
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="card-title">${voice.name}</span>
                            <span class="card-badge">${voice.gender === 'male' ? '♂' : '♀'}</span>
                        </div>
                        <div class="card-desc">${voice.style}</div>
                        <div class="card-meta">
                            <div class="meta-item">
                                <span class="meta-icon">🗣️</span>
                                <span>ID: ${voice.id}</span>
                            </div>
                        </div>
                    `;
                    card.onclick = () => selectVoice(voice.id);
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('加载音色列表失败:', error);
            }
        }
        
        // 加载当前配置
        async function loadCurrentConfig() {
            try {
                const response = await fetch('/api/config/current');
                const data = await response.json();
                currentModel = data.current_model;
                currentVoice = data.current_voice;
                
                document.getElementById('currentModel').textContent = currentModel;
                document.getElementById('currentVoice').textContent = currentVoice;
            } catch (error) {
                console.error('加载当前配置失败:', error);
            }
        }
        
        // 选择模型
        function selectModel(modelId) {
            currentModel = modelId;
            document.querySelectorAll('#modelsGrid .card').forEach(card => {
                card.classList.remove('active');
            });
            // 找到对应的卡片并激活
            const cards = document.querySelectorAll('#modelsGrid .card');
            cards.forEach(card => {
                if (card.querySelector('.card-title').textContent.includes('通义千问-' + modelId.split('-')[1].charAt(0).toUpperCase() + modelId.split('-')[1].slice(1))) {
                    card.classList.add('active');
                }
            });
            updateStatus('已选择模型: ' + modelId);
        }
        
        // 选择音色
        function selectVoice(voiceId) {
            currentVoice = voiceId;
            document.querySelectorAll('#voicesGrid .card').forEach(card => {
                card.classList.remove('active');
            });
            // 找到对应的卡片并激活
            const cards = document.querySelectorAll('#voicesGrid .card');
            cards.forEach(card => {
                if (card.querySelector('.meta-item span:nth-child(2)').textContent === voiceId) {
                    card.classList.add('active');
                }
            });
            updateStatus('已选择音色: ' + voiceId);
        }
        
        // 更新状态栏
        function updateStatus(message) {
            const statusBar = document.getElementById('statusBar');
            statusBar.textContent = message;
            statusBar.classList.add('show');
            setTimeout(() => {
                statusBar.classList.remove('show');
            }, 3000);
        }
        
        // 保存设置
        async function saveSettings() {
            try {
                // 设置模型
                await fetch('/api/config/set-model?model_id=' + currentModel, { method: 'POST' });
                
                // 设置音色
                await fetch('/api/config/set-voice?voice_id=' + currentVoice, { method: 'POST' });
                
                updateStatus('✅ 设置已保存！刷新主页生效');
                
                // 更新当前配置显示
                loadCurrentConfig();
                
                // 2秒后跳转回主页
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
                
            } catch (error) {
                updateStatus('❌ 保存失败，请重试');
                console.error('保存设置失败:', error);
            }
        }
        
        // 初始化
        window.onload = async () => {
            await loadModels();
            await loadVoices();
            await loadCurrentConfig();
        };
    </script>
</body>
</html>
