<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live2D OSS 最终测试</title>
    <script src="/static/js/pixi.min.js"></script>
    <script src="/static/js/live2dcubismcore.min.js"></script>
    <script src="/static/js/live2d-display.min.js"></script>
</head>
<body>
    <canvas id="live2dCanvas" width="300" height="400"></canvas>
    <script>
        // 1. 强制使用 Cubism 3
        PIXI.live2d.config.cubismVersion = 3;
        // 2. 关键！指向我们创建的空文件，骗过库的检查
        PIXI.live2d.config.live2dLibraryPath = '/static/js/live2d.min.js';

        const app = new PIXI.Application({
            view: document.getElementById('live2dCanvas'),
            width: 300,
            height: 400,
            backgroundAlpha: 0,
        });

        // 3. 从阿里云 OSS 加载你的模型
        const modelUrl = 'https://tour-guide-ai.oss-cn-shanghai.aliyuncs.com/haru_greeter_pro_jp/runtime/haru_greeter_t05.model3.json';

        console.log('⏳ 正在从 OSS 加载模型...');
        PIXI.live2d.Live2DModel.from(modelUrl)
            .then(model => {
                app.stage.addChild(model);
                model.x = 150;
                model.y = 220;
                model.scale.set(0.3);
                console.log('✅ 模型加载成功！');
            })
            .catch(err => {
                console.error('❌ 模型加载失败:', err);
                document.body.innerHTML += '<p style="color:red;">加载失败，请检查控制台 (F12)</p>';
            });
    </script>
</body>
</html>
