<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Shizuku 模型测试</title>
    <script src="/static/live2d-widget/L2Dwidget.min.js"></script>
</head>
<body>
    <p>如果成功，右下角会出现 Shizuku 模型。</p>
    <script>
        L2Dwidget.init({
            model: {
                // 根据实际文件路径调整
                jsonPath: '/static/live2d-widget/node_modules/live2d-widget-model-shizuku/assets/shizuku.model.json',
                scale: 1
            },
            display: {
                position: 'right',
                width: 300,
                height: 400,
                hOffset: 0,
                vOffset: -100
            },
            mobile: { show: false }
        });
        console.log('✅ L2Dwidget.init 已调用');
    </script>
</body>
</html>
