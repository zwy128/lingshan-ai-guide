<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live2D Haru 测试</title>
    <script src="/static/js/pixi.min.js"></script>
    <script src="/static/js/live2dcubismcore.min.js"></script>
    <script src="/static/js/live2d-display.min.js"></script>
</head>
<body>
    <canvas id="live2dCanvas" width="300" height="400" style="border:1px solid #ccc;"></canvas>
    <script>
        // 强制使用 Cubism 3
        PIXI.live2d.config.cubismVersion = 3;
        // 禁止自动加载 Cubism 2 的 live2d.min.js
        PIXI.live2d.config.live2dLibraryPath = '';

        const app = new PIXI.Application({
            view: document.getElementById('live2dCanvas'),
            width: 300,
            height: 400,
            backgroundAlpha: 0,
        });

        const modelUrl = '/static/live2d/haru/runtime/haru_greeter_t05.model3.json';
        PIXI.live2d.Live2DModel.from(modelUrl)
            .then(model => {
                app.stage.addChild(model);
                model.x = 150;
                model.y = 220;
                model.scale.set(0.3);
                console.log('✅ 模型加载成功！');
            })
            .catch(err => {
                console.error('❌ 模型加载失败:', err);
            });
    </script>
</body>
</html>
