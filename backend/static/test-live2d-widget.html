<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live2D Widget 测试</title>
    <script src="/static/live2d-widget/L2Dwidget.min.js"></script>
</head>
<body>
    <p>如果模型加载成功，它应该在页面右下角出现。</p>
    <script>
        L2Dwidget.init({
            model: {
                jsonPath: '/static/live2d/haru/runtime/haru_greeter_t05.model3.json',
                scale: 1
            },
            display: {
                position: 'right',
                width: 300,
                height: 400,
                hOffset: -50,
                vOffset: -100
            },
            mobile: {
                show: false
            }
        });
        console.log('已调用 L2Dwidget.init，请查看页面右下角');
    </script>
</body>
</html>
