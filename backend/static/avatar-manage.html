<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字人形象管理</title>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh}

.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:18px 25px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.header h1{font-size:1.6rem;background:linear-gradient(90deg,#e94560,#0f3460);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-btns{display:flex;gap:8px}
.nav-btn{color:#e94560;text-decoration:none;font-size:.85rem;padding:7px 16px;border:1px solid #e94560;border-radius:20px;transition:all .3s}
.nav-btn:hover{background:#e94560;color:#fff}

.container{max-width:1400px;margin:0 auto;padding:20px}
.section-title{font-size:1.2rem;margin:20px 0 12px;color:#e94560;display:flex;align-items:center;gap:8px}

/* 模型卡片网格 */
.model-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-bottom:25px}
.model-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;overflow:hidden;transition:all .3s;position:relative}
.model-card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(233,69,96,.15);border-color:rgba(233,69,96,.3)}
.model-card.active{border-color:#e94560;box-shadow:0 0 20px rgba(233,69,96,.2)}
.model-card.active::after{content:'当前使用';position:absolute;top:10px;right:10px;background:#e94560;color:white;font-size:11px;padding:3px 10px;border-radius:10px}

/* 模型预览区 */
.model-preview{height:220px;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.model-preview canvas{max-width:100%;max-height:100%}
.model-preview .emoji-icon{font-size:64px}
.model-preview .loading{color:rgba(255,255,255,.5);font-size:14px}

/* 模型信息 */
.model-info{padding:15px}
.model-info h3{font-size:1.1rem;margin-bottom:5px;color:#fff}
.model-info p{font-size:.85rem;color:#999;margin-bottom:8px}
.model-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.model-tag{font-size:.75rem;padding:3px 10px;background:rgba(233,69,96,.15);color:#e94560;border-radius:10px}

/* 模型操作按钮 */
.model-actions{display:flex;gap:8px;padding:0 15px 15px}
.btn{padding:7px 16px;border-radius:8px;font-size:.85rem;cursor:pointer;transition:all .2s;border:none}
.btn-primary{background:#e94560;color:white}
.btn-primary:hover{background:#c73850}
.btn-secondary{background:rgba(255,255,255,.1);color:#e0e0e0;border:1px solid rgba(255,255,255,.2)}
.btn-secondary:hover{background:rgba(255,255,255,.2)}
.btn-sm{padding:5px 12px;font-size:.8rem}

/* 表情测试面板 */
.expression-panel{margin-top:10px;padding:10px 15px;background:rgba(0,0,0,.2);border-radius:8px;display:none}
.expression-panel.show{display:block}
.expr-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.expr-btn{padding:6px;font-size:.75rem;background:rgba(255,255,255,.1);color:#ccc;border:1px solid rgba(255,255,255,.15);border-radius:6px;cursor:pointer;transition:all .2s;text-align:center}
.expr-btn:hover{background:rgba(233,69,96,.3);color:white;border-color:#e94560}
.expr-btn.active{background:#e94560;color:white;border-color:#e94560}

/* 上传区域 */
.upload-section{margin-top:30px;padding:25px;background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.15);border-radius:12px}
.upload-zone{border:2px dashed rgba(233,69,96,.3);border-radius:10px;padding:40px;text-align:center;cursor:pointer;transition:all .3s}
.upload-zone:hover,.upload-zone.dragover{border-color:#e94560;background:rgba(233,69,96,.05)}
.upload-zone p{color:#999;margin-top:10px;font-size:.9rem}
.upload-icon{font-size:40px;color:#e94560}

/* 预览弹窗 */
.preview-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:1000;display:none;align-items:center;justify-content:center}
.preview-overlay.show{display:flex}
.preview-box{background:#1a1a2e;border-radius:16px;padding:20px;max-width:500px;width:90%;position:relative}
.preview-close{position:absolute;top:10px;right:15px;color:#999;font-size:24px;cursor:pointer;background:none;border:none}
.preview-close:hover{color:white}
.preview-canvas{width:100%;height:400px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.preview-canvas canvas{max-width:100%;max-height:100%}
.preview-info{text-align:center;margin-top:15px}
.preview-info h3{color:white;font-size:1.2rem}
.preview-info p{color:#999;font-size:.9rem;margin-top:5px}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:white;padding:10px 24px;border-radius:20px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* 语音配置 */
.voice-config{margin-top:8px;display:flex;align-items:center;gap:8px}
.voice-config label{font-size:.8rem;color:#999}
.voice-config select{background:rgba(255,255,255,.1);color:#e0e0e0;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:4px 8px;font-size:.8rem}
.voice-config select option{background:#1a1a2e}
</style>
</head>
<body>

<div class="header">
  <h1>数字人形象管理</h1>
  <div class="nav-btns">
    <a href="/" class="nav-btn">返回主页</a>
    <a href="/static/settings.html" class="nav-btn">系统设置</a>
  </div>
</div>

<div class="container">
  <div class="section-title">🎭 内置形象</div>
  <div class="model-grid" id="modelGrid"></div>

  <div class="upload-section">
    <div class="section-title">📤 上传自定义形象</div>
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">📁</div>
      <p>拖拽 Live2D 模型文件到此处，或点击选择文件</p>
      <p style="font-size:.75rem;color:#666;margin-top:5px">支持 .model.json 格式（Cubism 2）</p>
    </div>
    <input type="file" id="fileInput" accept=".json,.zip" multiple style="display:none">
  </div>
</div>

<!-- 预览弹窗 -->
<div class="preview-overlay" id="previewOverlay">
  <div class="preview-box">
    <button class="preview-close" onclick="closePreview()">&times;</button>
    <div class="preview-canvas" id="previewCanvas"></div>
    <div class="preview-info">
      <h3 id="previewName"></h3>
      <div style="margin-top:10px;display:flex;gap:8px;justify-content:center">
        <button class="btn btn-primary" id="previewSelectBtn">使用此形象</button>
        <button class="btn btn-secondary" onclick="closePreview()">关闭</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var modelsConfig=[];
var previewApp=null;
var previewModel=null;

function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2500);
}

// 加载模型列表
async function loadModels(){
  try{
    var res=await fetch('/static/live2d/models.json');
    var data=await res.json();
    modelsConfig=(data.models||[]).filter(function(m){return m.type==='live2d' && m.modelUrl});
    renderModelGrid();
  }catch(e){
    showToast('加载模型列表失败');
  }
}

// 渲染模型卡片
function renderModelGrid(){
  var grid=document.getElementById('modelGrid');
  grid.innerHTML='';
  var currentId=localStorage.getItem('selectedModelId')||'shizuku';

  modelsConfig.forEach(function(model){
    var card=document.createElement('div');
    card.className='model-card'+(model.id===currentId?' active':'');
    card.innerHTML=`
      <div class="model-preview" id="preview-${model.id}">
        <div class="loading">加载预览...</div>
      </div>
      <div class="model-info">
        <h3>${model.name}</h3>
      </div>
      <div class="model-actions">
        <button class="btn btn-primary btn-sm" onclick="selectModel('${model.id}')">选择</button>
        <button class="btn btn-secondary btn-sm" onclick="openPreview('${model.id}')">预览</button>
      </div>
    `;
    grid.appendChild(card);

    // 加载缩略图预览
    loadThumbnail(model);
  });
}

// 加载缩略图
async function loadThumbnail(model){
  var container=document.getElementById('preview-'+model.id);
  if(!container)return;

  try{
    var app=new PIXI.Application({
      width:container.clientWidth||300,
      height:220,
      transparent:true,
      autoDensity:true,
      resolution:Math.min(window.devicePixelRatio||1,2)
    });
    container.innerHTML='';
    container.appendChild(app.view);

    var m=await PIXI.live2d.Live2DModel.from(model.modelUrl);
    app.stage.addChild(m);
    m.anchor.set(0.5,0.5);
    m.x=app.screen.width/2;
    m.y=app.screen.height/2;
    var sc=Math.min(app.screen.width/m.width,app.screen.height/m.height);
    m.scale.set(sc*0.7);
  }catch(e){
    container.innerHTML='<div style="font-size:48px">'+(model.thumbnail||'🎭')+'</div>';
  }
}

// 选择模型
async function selectModel(id){
  var model=modelsConfig.find(function(m){return m.id===id});
  if(!model)return;

  localStorage.setItem('selectedModelId',id);
  localStorage.setItem('selectedModelUrl',model.modelUrl);

  // 同步音色
  if(model.voice){
    try{await fetch('/api/config/set-voice?voice_id='+model.voice,{method:'POST'});}catch(e){}
  }

  // 更新卡片状态
  document.querySelectorAll('.model-card').forEach(function(c){c.classList.remove('active')});
  var card=document.querySelector('#preview-'+id);
  if(card)card.closest('.model-card').classList.add('active');

  showToast('已选择: '+model.name+'，返回主页生效');
}

// 打开大预览
async function openPreview(id){
  var model=modelsConfig.find(function(m){return m.id===id});
  if(!model)return;

  var overlay=document.getElementById('previewOverlay');
  var canvas=document.getElementById('previewCanvas');
  var name=document.getElementById('previewName');
  var selectBtn=document.getElementById('previewSelectBtn');

  name.textContent=model.name;
  selectBtn.onclick=function(){selectModel(id);closePreview()};

  // 清理旧预览
  if(previewApp){try{previewApp.destroy(true)}catch(e){}}
  previewApp=null;previewModel=null;

  try{
    previewApp=new PIXI.Application({
      width:460,
      height:400,
      transparent:true,
      autoDensity:true,
      resolution:Math.min(window.devicePixelRatio||1,2)
    });
    canvas.innerHTML='';
    canvas.appendChild(previewApp.view);

    previewModel=await PIXI.live2d.Live2DModel.from(model.modelUrl);
    previewApp.stage.addChild(previewModel);
    previewModel.anchor.set(0.5,0.5);
    previewModel.x=previewApp.screen.width/2;
    previewModel.y=previewApp.screen.height/2;
    var sc=Math.min(previewApp.screen.width/previewModel.width,previewApp.screen.height/previewModel.height);
    previewModel.scale.set(sc*0.85);
  }catch(e){
    canvas.innerHTML='<div style="color:white;padding:40px;text-align:center">预览加载失败<br><small>'+e.message+'</small></div>';
  }

  overlay.classList.add('show');
}

function closePreview(){
  document.getElementById('previewOverlay').classList.remove('show');
  if(previewApp){try{previewApp.destroy(true)}catch(e){}}
  previewApp=null;previewModel=null;
}

// 上传功能
var uploadZone=document.getElementById('uploadZone');
var fileInput=document.getElementById('fileInput');

uploadZone.onclick=function(){fileInput.click()};
uploadZone.ondragover=function(e){e.preventDefault();uploadZone.classList.add('dragover')};
uploadZone.ondragleave=function(){uploadZone.classList.remove('dragover')};
uploadZone.ondrop=function(e){e.preventDefault();uploadZone.classList.remove('dragover');handleUpload(e.dataTransfer.files)};
fileInput.onchange=function(){handleUpload(fileInput.files)};

async function handleUpload(files){
  for(var i=0;i<files.length;i++){
    var fd=new FormData();
    fd.append('file',files[i]);
    try{
      var res=await fetch('/api/admin/upload-avatar',{method:'POST',body:fd});
      var data=await res.json();
      showToast(data.url?'上传成功: '+files[i].name:'上传失败: '+(data.error||'未知错误'));
    }catch(e){
      showToast('上传失败');
    }
  }
  loadModels();
}

// ESC 关闭预览
document.onkeydown=function(e){if(e.key==='Escape')closePreview()};

// 初始化
window.onload=function(){loadModels()};
</script>

</body>
</html>
